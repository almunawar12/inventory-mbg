services:
  app:
    image: ghcr.io/almunawar12/inventory-mbg:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Inventory}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Jakarta}

      LOG_CHANNEL: stack
      LOG_LEVEL: ${LOG_LEVEL:-error}

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      CACHE_STORE: file
      SESSION_DRIVER: file
      SESSION_LIFETIME: 120
      QUEUE_CONNECTION: database

      FILESYSTEM_DISK: local
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_public:/var/www/html/storage/app/public
    networks:
      - dokploy-network
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.inventory.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.inventory.entrypoints=websecure
      - traefik.http.routers.inventory.tls.certresolver=letsencrypt
      - traefik.http.services.inventory.loadbalancer.server.port=80

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  app_storage:
  app_public:
  mysql_data:

networks:
  dokploy-network:
    external: true
  internal:
